services:
  postgres:
    image: postgres:18.3-alpine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./out/pgdata:/var/lib/postgresql

  migrate:
    image: migrate/migrate:v4.19.1
    container_name: migrate
    command:
      - -path
      - /migrations
      - -database
      - postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - up
    volumes:
      - ./migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    environment:
      - HTTP_ADDR=${HTTP_ADDR}
      - DATABASE_DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
